services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg13
    ports:
      - 5432:5432
    environment:
     - POSTGRES_USER=erp
     - POSTGRES_PASSWORD=erp
    command: >
      postgres
        -c max_worker_processes=20
        -c max_parallel_workers=8
        -c max_parallel_workers_per_gather=4
        -c timescaledb.max_background_workers=8
        -c track_activities=off
        -c track_counts=off
        -c track_functions=none
        -c wal_level=minimal
        -c synchronous_commit=off
        -c fsync=off
        -c max_wal_size=2GB
        -c min_wal_size=512MB
        -c max_wal_senders=0
    volumes:
      - erp_db_data:/var/lib/postgresql/data

  mongo:
    image: mongo:3.0
    ports:
      - 27017:27017

  redis:
    image: redis:5.0
    ports:
      - 6379:6379

volumes:
  erp_db_data:
